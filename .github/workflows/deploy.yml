name: Deploy Frontend and Backend to Hostinger

on:
  push:
    branches:
      - main  # Agar aapki branch master hai, toh master likhein

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Frontend Deps & Build
        run: |
          cd frontend
          npm install
          CI=false npm run build  # <--- Yahan humne CI=false laga diya hai taaki warnings ignore ho jayein

      - name: 🌐 Deploy Frontend Files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/build/
          server-dir: public_html/

      - name: ⚙️ Deploy Backend Files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: backend/
          server-dir: backend/
          exclude: |
            **/node_modules/**
            **/.git/**
            **/.github/**
            .env