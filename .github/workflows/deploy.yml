name: Deploy Frontend and Backend to Hostinger

on:
  push:
    branches:
      - main  # Agar aapki branch ka naam master hai, toh yahan master likhein

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 🌐 Deploy Frontend Files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/build/  # Agar React Vite hai toh dist, agar CRA hai toh build/ likhein
          server-dir: public_html/  # Frontend hostinger ke main folder me jayega

      - name: ⚙️ Deploy Backend Files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: backend/       # Humara local backend folder
          server-dir: backend/      # Hostinger ke andar 'backend' naam ka folder
          exclude: |
            **/node_modules/**
            **/.git/**
            **/.github/**
            .env